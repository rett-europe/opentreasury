# PR Checks — runs on every pull request to main
# Validates code quality for both backend (Python) and frontend (Angular)
#
# Required secrets: (none — PR checks don't deploy)

name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install flake8 black pytest pytest-cov pytest-asyncio

      - name: Lint (flake8)
        run: flake8 app/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Format check (black)
        run: black --check app/ tests/ --line-length=120

      - name: Syntax check (all files)
        run: |
          python -c "
          import py_compile, os, sys
          files = [os.path.join(r, f) for r, _, fs in os.walk('app') for f in fs if f.endswith('.py')]
          errors = 0
          for f in files:
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  print(e)
                  errors += 1
          if errors:
              sys.exit(1)
          print(f'OK: {len(files)} files')
          "

      - name: Tests
        run: python -m pytest tests/ -v --override-ini="addopts=" || true
        # TODO: Remove '|| true' once Cypher builds the test suite

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint

      - name: Build (production)
        run: npx ng build --configuration=production

      # TODO: Add test step once Jest is configured (jest.config.ts exists but runner not installed)
      # - name: Tests
      #   run: npx jest --ci
