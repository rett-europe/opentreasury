# Alembic configuration for the OpenTreasury SQLite (desktop) database.
# The actual database URL is supplied dynamically by env.py from
# ``app.config.settings`` so we do NOT set sqlalchemy.url here.

[alembic]
script_location = %(here)s
prepend_sys_path = .
path_separator = os
version_path_separator = os
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
