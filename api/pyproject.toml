[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-fail-under=85",
]
markers = [
    "financial: marks tests related to financial accuracy (deselect with '-m \"not financial\"')",
    "auth: marks tests related to authentication/authorization",
    "cosmos: marks tests related to Cosmos DB behavior (retries, pagination)",
    "slow: marks tests that are slow (deselect with '-m \"not slow\"')",
]
filterwarnings = [
    "ignore::DeprecationWarning:azure.*:",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/main.py",       # startup/shutdown wiring — tested via integration
    "app/config.py",     # env var loading — trivial
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    "pass",
]
show_missing = true
